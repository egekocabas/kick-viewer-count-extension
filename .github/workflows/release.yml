name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # https://github.com/actions/setup-node/releases/tag/v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Zip extensions
        run: |
          npm run zip:chrome
          npm run zip:firefox
          npm run zip:edge

      - name: Verify versions match
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CHROME_VERSION=$(ls .output/*-chrome.zip | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          FIREFOX_VERSION=$(ls .output/*-firefox.zip | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          SOURCES_VERSION=$(ls .output/*-sources.zip | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          EDGE_VERSION=$(ls .output/*-edge.zip | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')

          echo "::notice::package.json : $PKG_VERSION"
          echo "::notice::chrome zip   : $CHROME_VERSION"
          echo "::notice::firefox zip  : $FIREFOX_VERSION"
          echo "::notice::sources zip  : $SOURCES_VERSION"
          echo "::notice::edge zip     : $EDGE_VERSION"

          if [ "$PKG_VERSION" != "$CHROME_VERSION" ] || [ "$PKG_VERSION" != "$FIREFOX_VERSION" ] || [ "$PKG_VERSION" != "$SOURCES_VERSION" ] || [ "$PKG_VERSION" != "$EDGE_VERSION" ]; then
            echo "::error::Version mismatch detected, aborting!"
            exit 1
          fi

          echo "::notice::All versions match: $PKG_VERSION"

          if git ls-remote --tags origin | grep -q "refs/tags/v${PKG_VERSION}$"; then
            echo "::notice::Tag v${PKG_VERSION} exists in repo."
          else
            echo "::error::Tag v${PKG_VERSION} not found in repo — did you run 'npm version' and push tags?"
            exit 1
          fi

      # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
      - name: Upload zips
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: extension-zips
          path: .output/*.zip
          retention-days: 1
          include-hidden-files: true

  submit:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
      FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
      FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
      FIREFOX_CHANNEL: ${{ secrets.FIREFOX_CHANNEL }}
      EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
      EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
      EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
      EDGE_SKIP_SUBMIT_REVIEW: ${{ secrets.EDGE_SKIP_SUBMIT_REVIEW }}
    steps:
      # https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # https://github.com/actions/setup-node/releases/tag/v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # https://github.com/actions/download-artifact/releases/tag/v8.0.1
      - name: Download zips
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: extension-zips
          path: .output

      - name: Dry run — validate credentials for all stores
        run: npm run submit:dry-run

      - name: Submit to Chrome Web Store, Firefox Add-ons, and Edge Add-ons
        run: npm run submit:publish
