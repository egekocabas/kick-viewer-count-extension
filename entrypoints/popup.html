<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kick Viewer Count</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: Canvas;
        color: CanvasText;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px;
        border-bottom: 1px solid ButtonBorder;
      }

      .header img {
        width: 28px;
        height: 28px;
      }

      .header-text h1 {
        font-size: 13px;
        font-weight: 600;
      }

      .header-text p {
        font-size: 11px;
        color: GrayText;
        margin-top: 1px;
      }

      .links {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .link-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        transition: background 0.15s;
        cursor: pointer;
        color: LinkText;
      }

      .link-btn:hover {
        background: ButtonFace;
      }

      .link-btn .icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        opacity: 0.85;
      }

      .footer {
        padding: 10px 16px;
        font-size: 10px;
        color: GrayText;
        border-top: 1px solid ButtonBorder;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="/icons/48.png" alt="icon" />
      <div class="header-text">
        <h1>Kick Viewer Count</h1>
        <p>Shows hidden viewer counts on Kick.com</p>
      </div>
    </div>

    <div class="links">
      <a
        class="link-btn bug"
        href="https://forms.gle/iR1fZ2t9hnMEicCXA"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Report a bug or give feedback
      </a>

      <a
        class="link-btn github"
        href="https://github.com/egekocabas/kick-viewer-count-extension"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
        View on GitHub
      </a>
    </div>

    <div class="footer"></div>
    <script type="module" src="../src/popup.ts"></script>
  </body>
</html>
